<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article Editor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Article Editor</h1>
      <button id="new-article-btn" class="btn btn-primary">New Article</button>
    </header>

    <main>
      <!-- Article List -->
      <section id="article-list-section">
        <h2>Existing Articles</h2>
        <div id="article-list"></div>
      </section>

      <!-- Editor Form -->
      <section id="editor-section" class="hidden">
        <h2 id="editor-title">New Article</h2>
        <form id="article-form">
          <input type="hidden" id="original-slug">

          <div class="form-row">
            <div class="form-group">
              <label for="date">Date *</label>
              <input type="date" id="date" name="date" required>
            </div>
            <div class="form-group">
              <label for="tag">Tag</label>
              <input type="text" id="tag" name="tag" placeholder="e.g., Tutorial, Essay">
            </div>
          </div>

          <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" required spellcheck="true">
          </div>

          <div class="form-group">
            <label for="description">Description * <span class="hint">Used for page meta / link previews</span></label>
            <textarea id="description" name="description" rows="2" required spellcheck="true"></textarea>
          </div>

          <div class="form-group">
            <div class="body-toolbar">
              <label for="body">Body *</label>
              <label class="btn btn-small insert-image-label" title="Upload and insert image at cursor">
                &#128247; Insert Image
                <input type="file" id="inline-image-input" accept="image/*">
              </label>
            </div>
            <textarea id="body" name="body" rows="28" spellcheck="true" placeholder="Write your article in Markdown…"></textarea>
            <small>Type a caption between the brackets: <code>![A snowy mountain](./images/photo.jpg)</code></small>
            <div id="image-strip"></div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Article</button>
            <button type="button" id="cancel-btn" class="btn">Cancel</button>
            <button type="button" id="delete-btn" class="btn btn-danger hidden">Delete Article</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
