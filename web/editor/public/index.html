<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed Editor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Feed Editor</h1>
      <button id="new-post-btn" class="btn btn-primary">New Post</button>
    </header>

    <main>
      <!-- Post List -->
      <section id="post-list-section">
        <h2>Existing Posts</h2>
        <div id="post-list"></div>
      </section>

      <!-- Editor Form -->
      <section id="editor-section" class="hidden">
        <h2 id="editor-title">New Post</h2>
        <form id="post-form">
          <input type="hidden" id="original-filename">

          <div class="form-group">
            <label for="date">Date *</label>
            <input type="date" id="date" name="date" required>
          </div>

          <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" required spellcheck="true">
          </div>

          <div class="form-group">
            <label for="summary">Summary *</label>
            <textarea id="summary" name="summary" rows="8" required spellcheck="true"></textarea>
            <small>Supports basic markdown: **bold**, *italic*, [link](url)</small>
          </div>

          <div class="form-group">
            <label for="tag">Tag</label>
            <input type="text" id="tag" name="tag" placeholder="e.g., Book Review, Project">
          </div>

          <div class="form-group">
            <label for="link">Link URL</label>
            <input type="url" id="link" name="link" placeholder="https://...">
          </div>

          <div class="form-group">
            <label for="linkText">Link Text</label>
            <input type="text" id="linkText" name="linkText" placeholder="Read more">
          </div>

          <div class="form-group">
            <label>Images</label>
            <div id="current-images"></div>
            <div class="image-upload">
              <input type="file" id="image-input" accept="image/*">
              <button type="button" id="upload-btn" class="btn">Upload Image</button>
            </div>
            <div id="image-list"></div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Post</button>
            <button type="button" id="cancel-btn" class="btn">Cancel</button>
            <button type="button" id="delete-btn" class="btn btn-danger hidden">Delete Post</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
